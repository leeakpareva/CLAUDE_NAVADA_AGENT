version: "3.8"

# NAVADA Failover Infrastructure (Oracle VM)
# Only starts with: docker compose --profile failover up -d
# Stays dormant during normal operations.

services:
  nginx:
    image: nginx:alpine
    container_name: navada-failover-proxy
    profiles: [failover]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    network_mode: host

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: navada-failover-tunnel
    profiles: [failover]
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${ORACLE_TUNNEL_TOKEN}
    restart: unless-stopped
    network_mode: host
    depends_on:
      - nginx
