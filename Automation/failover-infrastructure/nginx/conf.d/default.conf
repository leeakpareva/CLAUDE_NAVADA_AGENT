# NAVADA Failover Nginx — Oracle VM
# Routes only critical webhook paths during failover.

server {
    listen 80 default_server;

    limit_req zone=general burst=20 nodelay;

    # Telegram bot webhook
    location /telegram/ {
        proxy_pass http://telegram_bot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Twilio SMS/voice webhooks
    location /twilio/ {
        proxy_pass http://telegram_bot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Trading API
    location /trading/ {
        proxy_pass http://trading_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        return 200 '{"status":"failover","server":"oracle","message":"Primary server offline, critical services on backup"}';
        add_header Content-Type application/json;
    }

    # Everything else — 503
    location / {
        return 503 '{"status":"failover","message":"Primary server offline. Critical services (Telegram, email, trading) are running on backup. Non-critical services unavailable."}';
        add_header Content-Type application/json;
    }
}
