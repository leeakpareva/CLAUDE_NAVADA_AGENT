version: '3.7'
services:
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus:/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana
    ports:
      - '3000:3000'
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager
    volumes:
      - ./alertmanager:/alertmanager
    ports:
      - '9093:9093'
    command:
      - '--config.file=/alertmanager/alertmanager.yml'