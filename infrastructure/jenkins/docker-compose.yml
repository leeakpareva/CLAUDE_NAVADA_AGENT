version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: navada-jenkins
    restart: unless-stopped
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - JENKINS_OPTS=--prefix=/jenkins
    networks:
      - navada-net

volumes:
  jenkins_home:
    name: navada-jenkins-data

networks:
  navada-net:
    external: true
    name: infrastructure_navada-net
