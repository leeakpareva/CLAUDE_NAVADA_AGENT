version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: navada-proxy
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - navada-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: navada-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    networks:
      - navada-net
    depends_on:
      - nginx

  # --- Ops / Monitoring ---

  prometheus:
    image: prom/prometheus:latest
    container_name: navada-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - navada-net

  grafana:
    image: grafana/grafana:latest
    container_name: navada-grafana
    ports:
      - "9090:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=navada
      - GF_SERVER_ROOT_URL=http://192.168.0.36:9090
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    restart: always
    depends_on:
      - prometheus
    networks:
      - navada-net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: navada-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always
    networks:
      - navada-net

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: navada-uptime
    ports:
      - "3002:3001"
    volumes:
      - uptime_data:/app/data
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - navada-net

volumes:
  prometheus_data:
  grafana_data:
  portainer_data:
  uptime_data:

networks:
  navada-net:
    driver: bridge
