version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: navada-proxy
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../navada-network-diagram.html:/usr/share/nginx/html/nodes/index.html:ro
      - ../Automation/reports/charts/NVADA-EDGE.SYSTEM DIAGRAM.V1.drawio.html:/usr/share/nginx/html/diagram/index.html:ro
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - navada-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: navada-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    networks:
      - navada-net
    depends_on:
      - nginx

  # --- Local Ops (stays on HP) ---

  portainer:
    image: portainer/portainer-ce:latest
    container_name: navada-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always
    networks:
      - navada-net

  # --- Migrated to Oracle VM (accessed via SSH tunnel) ---
  # Elasticsearch :9200, Kibana :5601, Prometheus :9091, Grafana :9090, Uptime Kuma :3002
  # Tunnel managed by PM2: oracle-elk-tunnel

volumes:
  portainer_data:

networks:
  navada-net:
    driver: bridge
