# NAVADA NVIDIA GPU Node — Future compose for GPU inference
# Deploy on Brev.dev, Lambda Cloud, or self-hosted GPU box
# Assumes: NVIDIA drivers, nvidia-container-toolkit, Docker, Tailscale

services:

  portainer-agent:
    image: portainer/agent:latest
    container_name: navada-portainer-agent
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: navada-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: always

  # Ollama for local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: navada-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always

  # Open WebUI for Ollama
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: navada-webui
    ports:
      - "3000:8080"
    volumes:
      - webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama
    restart: always

  # vLLM for high-throughput inference (optional, uncomment when needed)
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: navada-vllm
  #   ports:
  #     - "8000:8000"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   command: --model meta-llama/Llama-3.1-8B-Instruct --max-model-len 8192
  #   restart: always

volumes:
  ollama_data:
  webui_data:

networks:
  default:
    name: navada-net
    driver: bridge
