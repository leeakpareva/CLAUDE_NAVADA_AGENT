# NAVADA Azure VM — Future compose for Azure AI workloads
# Deploy when Azure VM is provisioned for Generali/enterprise work
# Assumes: Ubuntu, Docker, Tailscale joined as navada-azure

services:

  portainer-agent:
    image: portainer/agent:latest
    container_name: navada-portainer-agent
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: navada-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: always

  # MLflow for model tracking (Azure ML integration)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: navada-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    restart: always

  # Jupyter for notebooks
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: navada-jupyter
    ports:
      - "8888:8888"
    volumes:
      - jupyter_data:/home/jovyan/work
    environment:
      JUPYTER_TOKEN: navada
    restart: always

volumes:
  mlflow_data:
  jupyter_data:

networks:
  default:
    name: navada-net
    driver: bridge
