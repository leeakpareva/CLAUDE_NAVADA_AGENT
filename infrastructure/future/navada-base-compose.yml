# NAVADA Base Compose — Template for new Linux nodes
# Copy and adapt for each new node joining the mesh
# Prerequisites: Docker, Tailscale, SSH keys

services:

  # Portainer Agent — connects to Oracle Portainer for central management
  portainer-agent:
    image: portainer/agent:latest
    container_name: navada-portainer-agent
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    restart: always

  # Node Exporter — Prometheus metrics for this node
  node-exporter:
    image: prom/node-exporter:latest
    container_name: navada-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: always

networks:
  default:
    name: navada-net
    driver: bridge
