worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Upstream backends (host.docker.internal = Windows host)
    upstream navada_logo {
        server host.docker.internal:3000;
    }

    upstream excalidraw_server {
        server host.docker.internal:3001;
    }

    upstream portainer_server {
        server navada-portainer:9000;
    }

    upstream mlflow_server {
        server host.docker.internal:5000;
    }

    upstream jupyter_server {
        server host.docker.internal:8888;
    }

    upstream twilio_webhook {
        server 100.121.187.67:3456;  # HP Telegram bot via Tailscale
    }

    upstream network_scanner {
        server host.docker.internal:7777;
    }

    upstream kibana {
        server host.docker.internal:5601;  # Oracle VM ELK (SSH tunnel 5601->Oracle:5601)
    }

    upstream navada_flix {
        server host.docker.internal:4000;
    }

    upstream trading_api {
        server host.docker.internal:5678;
    }

    upstream cloudbeaver {
        server host.docker.internal:8978;
    }

    upstream grafana {
        server host.docker.internal:9090;  # Oracle VM Grafana (SSH tunnel 9090->Oracle:3000)
    }

    upstream uptime_kuma {
        server host.docker.internal:3002;  # Oracle VM Uptime Kuma (SSH tunnel 3002->Oracle:3001)
    }

    upstream jenkins {
        server 127.0.0.1:8082;  # Jenkins CI/CD (placeholder - not on Oracle)
    }

    upstream particle_words {
        server 100.121.187.67:3100;  # HP :3100 via Tailscale (Particle Words)
    }

    upstream mindmap {
        server 100.121.187.67:3101;  # HP :3101 via Tailscale (Architecture Mindmap)
    }

    # Include site configs
    include /etc/nginx/conf.d/*.conf;
}
