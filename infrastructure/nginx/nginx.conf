worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Upstream backends (host.docker.internal = Windows host)
    upstream clawd_dashboard {
        server host.docker.internal:3000;
    }

    upstream excalidraw_server {
        server host.docker.internal:3001;
    }

    upstream grafana_server {
        server navada-grafana:3000;
    }

    upstream prometheus_server {
        server navada-prometheus:9090;
    }

    upstream portainer_server {
        server navada-portainer:9000;
    }

    upstream uptime_server {
        server navada-uptime:3001;
    }

    upstream mlflow_server {
        server host.docker.internal:5000;
    }

    upstream jupyter_server {
        server host.docker.internal:8888;
    }

    # Include site configs
    include /etc/nginx/conf.d/*.conf;
}
