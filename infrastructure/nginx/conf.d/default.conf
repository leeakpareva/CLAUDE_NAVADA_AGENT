# =============================================================
# NAVADA Reverse Proxy — Route by subdomain / path
# All backends run on the Windows host (host.docker.internal)
# =============================================================

# -- Default server: landing / status page --
server {
    listen 80 default_server;
    server_name navada.local 192.168.0.36;

    limit_req zone=general burst=20 nodelay;

    # Health check
    location /health {
        return 200 '{"status":"ok","server":"navada"}';
        add_header Content-Type application/json;
    }

    # Status page
    location / {
        return 200 '<!DOCTYPE html>
<html><head><title>NAVADA</title>
<style>
body{font-family:system-ui;background:#0a0a0a;color:#e0e0e0;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.c{text-align:center;max-width:600px}
h1{font-size:3em;margin:0;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#888;font-size:1.1em}
a{color:#00d4ff;text-decoration:none}
.services{margin-top:2em;text-align:left}
.s{padding:8px 0;border-bottom:1px solid #222;display:flex;justify-content:space-between}
.s span:last-child{color:#00d4ff}
</style></head>
<body><div class="c">
<h1>NAVADA</h1>
<p>Home Server &bull; Always On</p>
<div class="services">
<div class="s"><span>Dashboard</span><span><a href="/dashboard/">:3000</a></span></div>
<div class="s"><span>Excalidraw</span><span><a href="/canvas/">:3001</a></span></div>
<div class="s"><span>Grafana</span><span><a href="http://192.168.0.36:9090">:9090</a></span></div>
<div class="s"><span>Prometheus</span><span><a href="http://192.168.0.36:9091">:9091</a></span></div>
<div class="s"><span>Portainer</span><span><a href="http://192.168.0.36:9000">:9000</a></span></div>
<div class="s"><span>Uptime Kuma</span><span><a href="http://192.168.0.36:3002">:3002</a></span></div>
<div class="s"><span>MLflow</span><span><a href="http://192.168.0.36:5000">:5000</a></span></div>
<div class="s"><span>Jupyter Lab</span><span><a href="http://192.168.0.36:8888">:8888</a></span></div>
</div>
</div></body></html>';
        add_header Content-Type text/html;
    }
}

# -- CLAWD Dashboard --
server {
    listen 80;
    server_name dashboard.navada.local;

    limit_req zone=general burst=20 nodelay;

    location / {
        proxy_pass http://clawd_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -- Excalidraw Canvas --
server {
    listen 80;
    server_name canvas.navada.local;

    limit_req zone=general burst=20 nodelay;

    location / {
        proxy_pass http://excalidraw_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -- Path-based routing on main IP (for iPhone without DNS) --
server {
    listen 8080;
    server_name 192.168.0.36 100.121.187.67;

    limit_req zone=general burst=20 nodelay;

    # Dashboard via path
    location /dashboard/ {
        proxy_pass http://clawd_dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Excalidraw via path
    location /canvas/ {
        proxy_pass http://excalidraw_server/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Grafana via path
    location /grafana/ {
        proxy_pass http://grafana_server/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Portainer via path
    location /portainer/ {
        proxy_pass http://portainer_server/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Uptime Kuma via path
    location /uptime/ {
        proxy_pass http://uptime_server/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MLflow via path
    location /mlflow/ {
        proxy_pass http://mlflow_server/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Jupyter via path
    location /jupyter/ {
        proxy_pass http://jupyter_server/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 http://$host:80;
    }
}
