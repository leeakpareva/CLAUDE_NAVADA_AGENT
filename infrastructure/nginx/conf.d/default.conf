# -- Kibana Log Search (Cloudflare subdomain) --
server {
    listen 80;
    server_name kibana.navada-edge-server.uk;

    limit_req zone=general burst=20 nodelay;

    # Redirect root to /kibana/
    location = / {
        return 302 /kibana/;
    }

    # Proxy /kibana/ to Kibana (matches its server.basePath)
    location /kibana/ {
        proxy_pass http://kibana/kibana/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -- NAVADA Node Network Diagram --
server {
    listen 80;
    server_name nodes.navada-edge-server.uk;

    limit_req zone=general burst=20 nodelay;

    location / {
        root /usr/share/nginx/html/nodes;
        index index.html;
        add_header Cache-Control "no-cache";
    }
}

# -- Path-based routing on main IP (for iPhone without DNS) --
server {
    listen 8080;
    server_name 192.168.0.58 100.121.187.67;

    limit_req zone=general burst=20 nodelay;

    # NAVADA Logo via path
    location /logo/ {
        proxy_pass http://navada_logo/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Excalidraw via path
    location /canvas/ {
        proxy_pass http://excalidraw_server/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Portainer via path
    location /portainer/ {
        proxy_pass http://portainer_server/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MLflow via path
    location /mlflow/ {
        proxy_pass http://mlflow_server/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Jupyter via path
    location /jupyter/ {
        proxy_pass http://jupyter_server/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Kibana (ELK log search)
    location /kibana/ {
        proxy_pass http://kibana/kibana/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Network Scanner & Router Dashboard (with WebSocket)
    location /network/ {
        proxy_pass http://network_scanner/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Trading API via path
    location /trading/ {
        proxy_pass http://trading_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api burst=10 nodelay;
    }

    # NAVADA Flix via path
    location /flix/ {
        proxy_pass http://navada_flix/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CloudBeaver via path
    location /cloudbeaver/ {
        proxy_pass http://cloudbeaver/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Jenkins CI/CD
    location /jenkins/ {
        proxy_pass http://jenkins/jenkins/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Node Network Diagram
    location /nodes/ {
        alias /usr/share/nginx/html/nodes/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    # Health
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 http://$host:80;
    }
}

