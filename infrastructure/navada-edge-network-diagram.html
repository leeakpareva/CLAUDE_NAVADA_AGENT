<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050505;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 30px 20px 10px;
    border-bottom: 1px solid #1a1a1a;
  }

  .header h1 {
    font-size: 2em;
    font-weight: 300;
    letter-spacing: 0.3em;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .header .subtitle {
    color: #555;
    font-size: 0.75em;
    letter-spacing: 0.15em;
  }

  .header .version {
    color: #333;
    font-size: 0.65em;
    margin-top: 4px;
  }

  .canvas-container {
    position: relative;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  svg.network {
    width: 100%;
    height: auto;
  }

  /* Node card styling */
  .node-card {
    fill: #0a0a0a;
    stroke: #222;
    stroke-width: 1.5;
    rx: 8;
    ry: 8;
  }

  .node-card.server { stroke: #00d4ff; stroke-width: 2; }
  .node-card.protected { stroke: #ff4444; stroke-width: 2; }
  .node-card.gateway { stroke: #7b2ff7; stroke-width: 2; }
  .node-card.compute { stroke: #ff8c00; stroke-width: 2; }
  .node-card.client { stroke: #00ff88; stroke-width: 2; }
  .node-card.mobile { stroke: #555; stroke-width: 1.5; }
  .node-card.cloud { stroke: #444; stroke-width: 1; fill: #080808; }

  .node-id {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .node-id.server { fill: #00d4ff; }
  .node-id.protected { fill: #ff4444; }
  .node-id.gateway { fill: #7b2ff7; }
  .node-id.compute { fill: #ff8c00; }
  .node-id.client { fill: #00ff88; }
  .node-id.mobile { fill: #888; }

  .node-name {
    font-size: 11px;
    font-weight: 600;
    fill: #ffffff;
    letter-spacing: 0.05em;
  }

  .node-hostname {
    font-size: 9px;
    fill: #666;
    font-style: italic;
  }

  .node-role {
    font-size: 8.5px;
    fill: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .node-ip {
    font-size: 9px;
    fill: #00d4ff;
    font-family: 'SF Mono', monospace;
  }

  .node-hw {
    font-size: 8px;
    fill: #444;
  }

  .service-label {
    font-size: 8px;
    fill: #999;
  }

  .service-item {
    font-size: 7.5px;
    fill: #666;
    font-family: 'SF Mono', monospace;
  }

  .service-item.online { fill: #00ff88; }
  .service-item.docker { fill: #2496ed; }
  .service-item.disabled { fill: #ff4444; opacity: 0.5; }
  .service-item.planned { fill: #555; font-style: italic; }
  .service-item.native { fill: #ff8c00; }

  .section-label {
    font-size: 8px;
    fill: #333;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .divider {
    stroke: #1a1a1a;
    stroke-width: 0.5;
  }

  /* Connection lines */
  .conn-tailscale {
    stroke: #00d4ff;
    stroke-width: 1.2;
    stroke-dasharray: 6 3;
    fill: none;
    opacity: 0.4;
  }

  .conn-tunnel {
    stroke: #7b2ff7;
    stroke-width: 1.5;
    stroke-dasharray: 8 4;
    fill: none;
    opacity: 0.5;
  }

  .conn-ssh {
    stroke: #00ff88;
    stroke-width: 1;
    stroke-dasharray: 4 4;
    fill: none;
    opacity: 0.3;
  }

  .conn-internet {
    stroke: #ff8c00;
    stroke-width: 1.5;
    fill: none;
    opacity: 0.3;
  }

  /* Pulse animation for active connections */
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  .conn-tailscale { animation: pulse 4s ease-in-out infinite; }

  /* Legend */
  .legend-dot {
    r: 4;
  }

  .legend-text {
    font-size: 8px;
    fill: #666;
  }

  /* Status indicator */
  .status-dot {
    r: 3;
  }

  .status-dot.online { fill: #00ff88; }
  .status-dot.offline { fill: #ff4444; }
  .status-dot.planned { fill: #555; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 15px;
    border-top: 1px solid #1a1a1a;
    color: #333;
    font-size: 0.65em;
    letter-spacing: 0.1em;
  }

  /* Mesh overlay */
  .mesh-bg {
    fill: none;
    stroke: #0d0d0d;
    stroke-width: 0.5;
  }

  .cloud-label {
    font-size: 10px;
    fill: #555;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .port-tag {
    font-size: 7px;
    fill: #00d4ff;
    opacity: 0.7;
  }

  .protected-badge {
    font-size: 7px;
    fill: #ff4444;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
