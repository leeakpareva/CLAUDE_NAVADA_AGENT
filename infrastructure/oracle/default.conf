# =============================================================
# NAVADA Reverse Proxy — Oracle VM
# HP services via Tailscale, Oracle services via Docker DNS
# =============================================================

# -- Default server: landing / status page --
server {
    listen 80 default_server;
    server_name navada.local 100.77.206.9 132.145.46.184 api.navada-edge-server.uk;

    limit_req zone=general burst=20 nodelay;

    # Twilio SMS webhook
    location /twilio/ {
        limit_req zone=navada_webhook burst=10 nodelay;
        proxy_pass http://twilio_webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram bot webhook (via Cloudflare Tunnel)
    location /telegram/ {
        limit_req zone=navada_webhook burst=10 nodelay;
        proxy_pass http://twilio_webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok","server":"navada-oracle","node":"oracle"}';
        add_header Content-Type application/json;
    }

    # Status page
    location / {
        return 200 '<!DOCTYPE html>
<html><head><title>NAVADA</title>
<style>
body{font-family:system-ui;background:#0a0a0a;color:#e0e0e0;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.c{text-align:center}
h1{font-size:3em;margin:0;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#888;font-size:1.1em;margin-top:0.5em}
</style></head>
<body><div class="c">
<h1>NAVADA</h1>
<p>Edge Infrastructure &bull; Online &bull; Oracle VM</p>
</div></body></html>';
        add_header Content-Type text/html;
    }
}

