worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version
    server_tokens off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-NAVADA-Node "oracle-gateway" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=navada_api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=navada_webhook:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=navada_admin:10m rate=10r/m;

    # --- Upstream backends ---

    # HP services via Tailscale (primary + ASUS backup)
    upstream twilio_webhook {
        server 100.121.187.67:3456;       # HP primary (always-on)
        server 100.88.118.128:3456 backup; # ASUS (when available)
    }

    upstream navada_logo {
        server 100.121.187.67:3000;  # HP via Tailscale
    }

    upstream navada_flix {
        server 100.121.187.67:4000;  # HP via Tailscale
    }

    upstream network_scanner {
        server 100.121.187.67:7777;  # HP via Tailscale
    }

    upstream trading_api {
        server 100.121.187.67:5678;  # HP via Tailscale
    }

    upstream particle_words {
        server 100.88.118.128:3100;  # ASUS via Tailscale
    }

    upstream mindmap {
        server 100.88.118.128:3101;  # ASUS via Tailscale
    }

    # Oracle local services (Docker network or localhost)
    upstream portainer_server {
        server navada-portainer:9000;
    }

    upstream kibana {
        server 127.0.0.1:5601;  # ELK disabled to save memory — re-enable when needed
    }

    upstream grafana {
        server navada-grafana:3000;  # Oracle Docker network
    }

    upstream uptime_kuma {
        server navada-uptime:3001;  # Oracle Docker network
    }

    upstream cloudbeaver {
        server cloudbeaver:8978;  # Oracle Docker network
    }

    upstream excalidraw_server {
        server 100.88.118.128:3001;  # ASUS via Tailscale (when available)
    }

    upstream mlflow_server {
        server 100.88.118.128:5000;  # ASUS via Tailscale (when available)
    }

    upstream jupyter_server {
        server 100.88.118.128:8888;  # ASUS via Tailscale (when available)
    }

    # Include site configs
    include /etc/nginx/conf.d/*.conf;
}
