# AlertManager Configuration

# This is a sample configuration for AlertManager

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

  routes:
    - match:
        severity: critical
      receiver: 'email'

receivers:
  - name: 'email'
    email:
      to: 'alert@example.com'
      from: 'monitor@example.com'
      smarthost: 'smtp.example.com:587'
      auth_username: 'alert@example.com'
      auth_identity: 'alert@example.com'
      auth_password: 'password'
      send_resolved: true

# Optional: You may define additional settings like templates, API URL etc.
