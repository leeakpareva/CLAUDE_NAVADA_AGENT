# NAVADA Edge — AlertManager Configuration
# Routes critical alerts to email (Zoho SMTP) and Telegram

global:
  smtp_smarthost: 'smtp.zoho.eu:587'
  smtp_from: 'claude.navada@zohomail.eu'
  smtp_auth_username: 'claude.navada@zohomail.eu'
  smtp_auth_password: 'Th9LtaY8XB6w'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'node']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'navada-default'

  routes:
    - match:
        severity: critical
      receiver: 'navada-critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'navada-default'
      repeat_interval: 4h

receivers:
  - name: 'navada-critical'
    email_configs:
      - to: 'leeakpareva@gmail.com'
        send_resolved: true
        headers:
          Subject: 'NAVADA CRITICAL: {{ .GroupLabels.alertname }}'
    webhook_configs:
      - url: 'https://edge-api.navada-edge-server.uk/telegram/alert'
        send_resolved: true

  - name: 'navada-default'
    email_configs:
      - to: 'leeakpareva@gmail.com'
        send_resolved: true
        headers:
          Subject: 'NAVADA Alert: {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'node']
