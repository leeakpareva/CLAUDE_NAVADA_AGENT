# NAVADA Edge — Prometheus Configuration
# Scrapes all 5 nodes for metrics

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

# AlertManager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - navada-alertmanager:9093

# Alert rules
rule_files:
  - /etc/prometheus/alert-rules.yml

# Scrape targets — all NAVADA nodes
scrape_configs:
  # Self (Prometheus on Oracle)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          node: 'NAVADA-ROUTER'

  # EC2 Health Monitor API (:9090 on EC2)
  - job_name: 'ec2-health-monitor'
    metrics_path: /metrics
    static_configs:
      - targets: ['3.11.119.181:9090']
        labels:
          node: 'NAVADA-COMPUTE'
    scrape_interval: 60s

  # WorldMonitor (:4000 on EC2)
  - job_name: 'worldmonitor'
    metrics_path: /
    static_configs:
      - targets: ['3.11.119.181:4000']
        labels:
          node: 'NAVADA-COMPUTE'
    scrape_interval: 120s

  # Cloudflare Worker (edge-api health)
  - job_name: 'cloudflare-worker'
    metrics_path: /status
    params:
      key: ['navada-edge-2026']
    scheme: https
    static_configs:
      - targets: ['edge-api.navada-edge-server.uk']
        labels:
          node: 'NAVADA-GATEWAY'
    scrape_interval: 60s

  # Nginx on Oracle (self, via Docker network)
  - job_name: 'nginx'
    static_configs:
      - targets: ['navada-proxy:80']
        labels:
          node: 'NAVADA-ROUTER'
    scrape_interval: 60s

  # Grafana (self, via Docker network)
  - job_name: 'grafana'
    static_configs:
      - targets: ['navada-grafana:3000']
        labels:
          node: 'NAVADA-ROUTER'

  # HP PostgreSQL (via Tailscale)
  - job_name: 'hp-postgres'
    static_configs:
      - targets: ['100.121.187.67:5433']
        labels:
          node: 'NAVADA-EDGE-SERVER'
    scrape_interval: 120s

  # Node Exporter (if installed on EC2/Oracle)
  - job_name: 'node-exporter-ec2'
    static_configs:
      - targets: ['3.11.119.181:9100']
        labels:
          node: 'NAVADA-COMPUTE'
    scrape_interval: 60s

  - job_name: 'node-exporter-oracle'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          node: 'NAVADA-ROUTER'
    scrape_interval: 60s
