# NAVADA Flix - Media Streaming
server {
    listen 80;
    server_name flix.navada-edge-server.uk;

    # API routes
    location /api/ {
        proxy_pass http://navada-flix-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HLS streaming
    location /hls/ {
        proxy_pass http://navada-flix-api:4000/hls/;
        proxy_set_header Host $host;
        proxy_buffering off;

        # CORS for hls.js player
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Cache-Control 'public, max-age=3600';
    }

    # Static player
    location / {
        proxy_pass http://navada-flix-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# MCP Servers
server {
    listen 80;
    server_name mcp.navada-edge-server.uk;

    location / {
        proxy_pass http://host.docker.internal:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Default - status page
server {
    listen 80 default_server;

    location / {
        return 200 '{"status":"ok","service":"navada-edge-aws","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    location /health {
        return 200 'healthy';
        add_header Content-Type text/plain;
    }
}
