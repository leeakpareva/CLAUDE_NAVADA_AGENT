# NAVADA Edge — Production Compose
# Deployed on NAVADA-ROUTER (Oracle VM: 100.77.206.9)
# Telegram bot runs on Cloudflare Workers (NOT in this compose)
#
# Usage: docker compose -f docker-compose.prod.yml up -d
# Nodes: Oracle runs routing/observability, EC2 runs compute (PM2)


services:
  # === ROUTING (Oracle VM) ===
  nginx:
    image: nginx:alpine
    container_name: navada-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - navada-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: navada-tunnel
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - navada-net
    depends_on:
      nginx:
        condition: service_healthy

  # === OBSERVABILITY (Oracle VM) ===
  prometheus:
    image: prom/prometheus:latest
    container_name: navada-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - navada-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: navada-grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-navada2026}
      GF_SERVER_ROOT_URL: https://grafana.navada-edge-server.uk
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - navada-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:latest
    container_name: navada-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./infrastructure/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - navada-net

  # === MANAGEMENT (Oracle VM) ===
  portainer:
    image: portainer/portainer-ce:latest
    container_name: navada-portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - navada-net

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    restart: always
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - navada-net

  # === AUTO-UPDATE ===
  watchtower:
    image: containrrr/watchtower
    container_name: navada-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 86400
      WATCHTOWER_LABEL_ENABLE: "false"
    networks:
      - navada-net

volumes:
  prometheus_data:
  grafana_data:
  portainer_data:
  cloudbeaver_data:

networks:
  navada-net:
    driver: bridge
