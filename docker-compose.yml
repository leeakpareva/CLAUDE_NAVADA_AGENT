version: '3.8'

services:
  navada:
    image: navada:latest
    container_name: navada_container
    restart: always
    volumes:
      - navada_data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: "exit 0"
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - NODE_ENV=production

volumes:
  navada_data:

networks:
  default:
    driver: bridge
